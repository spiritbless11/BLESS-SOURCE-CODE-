<!DOCTYPE html>
<html lang="fr" data-theme="normal">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>BLESS SOURCE — Authentification</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="auth.css">
  
  <!-- PROTECTION IMMEDIATE: Si l'utilisateur est déjà connecté, rediriger vers l'index -->
  <script>
    (function() {
      if (localStorage.getItem('bl-logged-in') === 'true') {
        window.location.href = 'index.html';
      }
    })();
  </script>
</head>
<body>

  <!-- EFFETS SPECIAUX DE THEMES (Synchronisés avec style.css) -->
  <div class="hk-scan"></div>
  <div class="blood-wrap">
    <div class="drip"></div><div class="drip"></div>
    <div class="drip"></div><div class="drip"></div><div class="drip"></div>
  </div>
  <div class="solar-wrap">
    <div class="solar-ring"></div><div class="solar-ring"></div><div class="solar-ring"></div>
  </div>
  <div class="cyber-grid"></div>

  <!-- CANVAS ARRIERE-PLAN -->
  <canvas id="bgCanvas"></canvas>
  <canvas id="matrixCanvas"></canvas>

  <!-- SELECTEUR DE MODE CLAIR / SOMBRE FLOUTÉ -->
  <div class="auth-mode-selector">
    <button class="ctrl" onclick="toggleMode()" id="modeBtn" title="Basculez le Mode Lumineux"><i class="fas fa-sun"></i></button>
  </div>

  <!-- SELECTEUR DE THEME COMPACT -->
  <div class="auth-theme-selector">
    <button class="theme-trigger-btn" onclick="toggleThemePopover(event)" title="Changer d'ambiance / Thème">
      <i class="fas fa-palette"></i>
    </button>
    <div class="auth-theme-popover" id="themePopover">
      <div class="theme-sect-title" style="margin-top: 0;">Sélectionner un Thème</div>
      <div class="auth-theme-grid">
        <div class="auth-theme-item active" onclick="setTheme('normal')"><i class="fas fa-code"></i>Normal</div>
        <div class="auth-theme-item" onclick="setTheme('escanor')"><i class="fas fa-sun"></i>Escanor</div>
        <div class="auth-theme-item" onclick="setTheme('hacker')"><i class="fas fa-terminal"></i>Hacker</div>
        <div class="auth-theme-item" onclick="setTheme('horror')"><i class="fas fa-skull"></i>Horror</div>
        <div class="auth-theme-item" onclick="setTheme('cyberpunk')"><i class="fas fa-bolt"></i>Cyber</div>
        <div class="auth-theme-item" onclick="setTheme('aqua')"><i class="fas fa-tint"></i>Aqua</div>
        <div class="auth-theme-item" onclick="setTheme('cosmos')"><i class="fas fa-meteor"></i>Cosmos</div>
        <div class="auth-theme-item" onclick="setTheme('luxury')"><i class="fas fa-crown"></i>Luxury</div>
      </div>
    </div>
  </div>

  <!-- ZONE DE CONNEXION / INSCRIPTION -->
  <div class="auth-container">
    <div class="auth-card" id="authCard">
      
      <!-- En-tête -->
      <div class="auth-header">
        <div class="auth-logo"><i class="fas fa-code"></i></div>
        <div class="auth-badge" id="heroBadge" style="position: static; display: inline-block; margin-bottom: 8px;">CODE VIEWER</div>
        <h1 class="auth-title" id="heroTitle">BLESS SOURCE</h1>
        <p class="auth-subtitle" id="heroSubtitle">Veuillez vous authentifier pour continuer</p>
      </div>

      <!-- Onglets Navigation Formulaires -->
      <div class="auth-tabs">
        <button class="auth-tab-btn active" onclick="switchForm('login')">
          <i class="fas fa-sign-in-alt"></i> Connexion
        </button>
        <button class="auth-tab-btn" onclick="switchForm('register')">
          <i class="fas fa-user-plus"></i> Inscription
        </button>
      </div>

      <!-- Conteneur Formulaires -->
      <div class="form-container">
        
        <!-- Formulaire de Connexion -->
        <form id="loginForm" class="auth-form active">
          <div class="auth-field">
            <label class="auth-field-lbl">Adresse Email</label>
            <div class="auth-input-wrapper">
              <i class="fas fa-envelope auth-input-icon"></i>
              <input type="email" id="loginEmail" class="auth-input" placeholder="nom@exemple.com" required autocomplete="email">
            </div>
          </div>
          <div class="auth-field" style="margin-bottom: 24px;">
            <label class="auth-field-lbl">Mot de passe</label>
            <div class="auth-input-wrapper">
              <i class="fas fa-lock auth-input-icon"></i>
              <input type="password" id="loginPassword" class="auth-input" placeholder="••••••••" required autocomplete="current-password">
              <button type="button" class="auth-password-toggle" onclick="togglePassword('loginPassword', this)">
                <i class="fas fa-eye"></i>
              </button>
            </div>
          </div>
          <button type="submit" class="auth-btn">
            <i class="fas fa-key"></i> SE CONNECTER
          </button>
        </form>

        <!-- Formulaire d'Inscription -->
        <form id="registerForm" class="auth-form">
          <div class="auth-field">
            <label class="auth-field-lbl">Adresse Email</label>
            <div class="auth-input-wrapper">
              <i class="fas fa-envelope auth-input-icon"></i>
              <input type="email" id="registerEmail" class="auth-input" placeholder="nom@exemple.com" required autocomplete="email">
            </div>
          </div>
          <div class="auth-field">
            <label class="auth-field-lbl">Mot de passe</label>
            <div class="auth-input-wrapper">
              <i class="fas fa-lock auth-input-icon"></i>
              <input type="password" id="registerPassword" class="auth-input" placeholder="Au moins 6 caractères" required autocomplete="new-password">
              <button type="button" class="auth-password-toggle" onclick="togglePassword('registerPassword', this)">
                <i class="fas fa-eye"></i>
              </button>
            </div>
          </div>
          <div class="auth-field" style="margin-bottom: 24px;">
            <label class="auth-field-lbl">Confirmer le mot de passe</label>
            <div class="auth-input-wrapper">
              <i class="fas fa-check-double auth-input-icon"></i>
              <input type="password" id="registerConfirmPassword" class="auth-input" placeholder="••••••••" required autocomplete="new-password">
              <button type="button" class="auth-password-toggle" onclick="togglePassword('registerConfirmPassword', this)">
                <i class="fas fa-eye"></i>
              </button>
            </div>
          </div>
          <button type="submit" class="auth-btn">
            <i class="fas fa-user-plus"></i> CRÉER UN COMPTE
          </button>
        </form>

      </div>

      <!-- Indicateur d'état de base de données Firebase / Local -->
      <div class="firebase-status-badge local" id="firebaseStatusBadge">
        <span class="firebase-status-dot"></span> Connexion locale
      </div>

    </div>
  </div>

  <!-- Notification Toast -->
  <div class="toast" id="toast"></div>

  <!-- SCRIPTS COMPATIBILITÉ FIREBASE (SDK v10 via compat mode CDN) -->
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

  <!-- CONFIGURATION ET LOGIQUE APPLICATION -->
  <script src="firebase-config.js"></script>
  <script src="auth.js"></script>
</body>
</html>
